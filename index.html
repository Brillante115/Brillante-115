<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilar y Pepe</title>

<!-- Google Fonts -->
https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Montserrat:wght@300;400&display=swap

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Montserrat', sans-serif;
  background: repeating-linear-gradient(
    90deg,
    #f5f5f5,
    #f5f5f5 2px,
    #eeeeee 2px,
    #eeeeee 6px
  );
  color: #3b4a54;
  text-align: center;
  padding: 40px 20px;
}

/* HERO */
.hero {
  margin-top: 60px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 70px;
  font-weight: 300;
}

.hero span {
  font-size: 70px;
  color: #7b6b5a;
}

/* SUBTITLE */
.subtitle {
  margin-top: 20px;
  letter-spacing: 6px;
  font-size: 12px;
  text-transform: uppercase;
  color: #6f7d86;
}

/* IMAGE */
.image-container {
  margin: 60px auto;
  max-width: 500px;
}

.image-container img {
  width: 100%;
  border-radius: 6px;
}

/* TIME */
.time {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  margin-top: 20px;
}

.location {
  font-size: 20px;
  margin-top: 10px;
}

/* MENU ICON */
.menu {
  position: fixed;
  top: 25px;
  right: 25px;
}

.menu div {
  width: 25px;
  height: 2px;
  background-color: #333;
  margin: 5px 0;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero h1 {
    font-size: 42px;
  }

  .hero span {
    font-size: 42px;
  }

  .time {
    font-size: 40px;
  }
}

</style>
</head>

<body>

<!-- MENU ICON -->
<div class="menu">
  <div></div>
  <div></div>
  <div></div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Pilar <span>y</span> Pepe</h1>

  <div class="subtitle">
    SÁBADO · 3 DE OCTUBRE DE 2026 · CÓRDOBA
  </div>
</section>

<!-- IMAGE -->
<div class="image-container">
  <!-- Cambia esta imagen por la tuya -->
  https://images.unsplash.com/photo-1520637736862-4d197d17c33a
</div>

<!-- INFO -->
<div class="time">
  11:45
</div>

<div class="location">
  Iglesia de San Pablo
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pilar y Pepe</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Montserrat', sans-serif;
  background: repeating-linear-gradient(90deg,#f5f5f5,#f5f5f5 2px,#eeeeee 2px,#eeeeee 6px);
  text-align:center;
  color:#2e3a44;
}

.menu {position:fixed;top:25px;right:25px;}
.menu div {width:25px;height:2px;background:#333;margin:5px 0;}

.hero {margin-top:100px;animation:fadeIn 1.5s ease;}
.hero h1 {font-family:'Playfair Display',serif;font-size:80px;font-weight:300;}
.hero span {color:#7a6a5a;}

.subtitle {margin-top:20px;letter-spacing:5px;font-size:12px;text-transform:uppercase;color:#6b7a84;}

.image-container {margin:60px auto;width:90%;max-width:500px;}
.image-container img {width:100%;border-radius:6px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}

.time {font-family:'Playfair Display',serif;font-size:60px;margin-top:20px;}
.location {font-size:18px;margin-top:10px;}

@keyframes fadeIn {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

@media (max-width:768px){.hero h1{font-size:45px}.time{font-size:40px}}
</style>
</head>

<body>

<div class="menu"><div></div><div></div><div></div></div>

<section class="hero">
  <h1>Pilar <span>y</span> Pepe</h1>
  <div class="subtitle">SÁBADO · 3 DE OCTUBRE DE 2026 · CÓRDOBA</div>
</section>

<div class="image-container">
  <img src="images/foto.jpg" alt="Imagen evento">
</div>

<div class="time">11:45</div>
<div class="location">Iglesia de San Pablo</div>

</body>
</html>

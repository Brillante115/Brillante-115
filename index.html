<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pilar y Pepe</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: repeating-linear-gradient(
    90deg,
    #f5f5f5,
    #f5f5f5 2px,
    #eeeeee 2px,
    #eeeeee 6px
  );
  text-align: center;
  color: #2e3a44;
}

.hero {
  margin-top: 100px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  font-weight: 300;
}

.subtitle {
  margin-top: 20px;
  letter-spacing: 3px;
  font-size: 14px;
}

.image-container {
  margin: 40px auto;
  max-width: 400px;
}

.image-container img {
  width: 100%;
  border-radius: 6px;
}

.time {
  font-family: 'Playfair Display', serif;
  font-size: 50px;
  margin-top: 20px;
}

.location {
  margin-top: 10px;
}

</style>
</head>

<body>

<section class="hero">
  <h1>Pilar y Pepe</h1>

  <div class="subtitle">
    SÁBADO · 3 DE OCTUBRE DE 2026 · CÓRDOBA
  </div>
</section>

<div class="image-container">
  <img src="images/foto.jpg" alt="Imagen boda">
</div>

<div class="time">
  11:45
</div>

<div class="location">
  Iglesia de San Pablo
</div>

</body>
</html>
